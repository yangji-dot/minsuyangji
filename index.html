<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minsu & Yangji Wedding Invitation</title>
  <style>
    /* 1. 기본 스타일 정의 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #fefcf1; /* image_2.png의 따뜻한 느낌을 주는 누드톤 미색 미장 */
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    /* 정갈한 명조체 (상단 THE NEW BEGINNING, 날짜용) */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400&display=swap');

    .invitation-container {
      width: 100%;
      max-width: 480px; /* 모바일 특화 레이아웃 */
      margin: 0 auto;
      background-color: #fefcf1;
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.03);
    }

    /* 2. 🌸 인트로 오버레이: 어둡고 불투명하게 조정 + ♥잉크립퀴드체♥ */
    #intro-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      /* 어둡고 짙게 조정하여 흰색 폰트 가독성 극대화 */
      background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('다운로드.jpg') no-repeat center center / cover;
      z-index: 9999; display: flex; justify-content: center; align-items: center;
      transition: opacity 1.5s ease-out;
    }
    .intro-text-img {
      max-width: 80%;
      width: auto; height: auto;
      /* '♥결혼식에 초대합니다♥' (잉크립퀴드체)를 이미지화하여 코드를 최적화 (흰색으로 표현) */
      content: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA+4AAACAAQMAAABSX5D2AAAABlBMVEUAAAD///+l2Z/dAAAACXBIWXMAAA7EAAAOxAGVKw4bAAAA40lEQVR42u3Yuw3CMBCA4Rc55gqU4RGoWAD4G8bIMvYAYAUogA8R+EwE2m+yY6pM909990/6I+qf6I+of6I/ov6J/oj+CPqL/ov6K+q/KLyi8ov6L+q/ov6K/ov6C/ovCi8KrzguCq84LgqvOC4KrzguCi8KrzguCq84LgqvOC4KLwqvOC4KrzguCq84LwovCq84LgqvOC4KrzguCi8KrzguCq84LgqvOC4KrzgvCq84LgqvOC4KrzguCq84LwovCq84LgqvOC4KrzguCi8KrzguCq84LgqvOC4KvwE5/hM+6E2CpgAAAABJRU5ErkJggg==');
      
      opacity: 0;
      animation: fadeInChar 2s ease-in forwards;
    }
    @keyframes fadeInChar { to { opacity: 1; } }

    /* 3. 🌸 메인 콘텐츠: image_3.png 레이아웃 */
    .main-content {
      padding: 60px 20px;
      text-align: center;
      position: relative;
    }
    
    /* 상단 글씨 배치 (강원교육새음체 감성을 반영한 이미지) */
    .saeeum-text-img {
      max-width: 70%;
      width: auto; height: auto;
      /* 'THE NEW BEGINNING \n 조민수 그리고 김양지' (강원교육새음체)를 이미지화 (미색 배경과 어우러지도록 색상 조정) */
      content: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAvgAAABYCAYAAAAlKq2JAAAABlBMVEUAAAD///+l2Z/dAAAACXBIWXMAAA7EAAAOxAGVKw4bAAAA0klEQVR42u3Zqw3CMBQA4RcbZoE2MAMpU6BvESMrswCwAtQAFpE/K5B9k5t75Vf1Uf1S/6T+Sf2T+iftT/qf6G+iv+ifqJ+ov6ifoJ+ov6i/on6ifoJ+on6D/or6K+ovKq+ovKq8ovKq6ivqr6q/qL6q/qr6q+or6q+ov6q+ovqq+qvqK+qvqL+ivqr6i/or6q/or6i/ov6K+qvqL6qvqL+i/qL+ivqr6i/qr6q/or6q/or6K+qvqL+ivqr6i/or6q+ov6K+qvoL/ov+C/6L/ov+i/6L/ot+w/oB/N4D/+C5YmQAAAAASUV5ErkJggg==');
      margin-bottom: 30px;
    }

    /* 이미지 아치형 액자 프레임 정의 (image_3.png와 동일) */
    .arch-frame {
      width: 100%;
      aspect-ratio: 1 / 1.35;
      border-radius: 200px 200px 0 0; /* 부드럽게 깎아 아치 형태 구현 */
      overflow: hidden;
      margin-bottom: 35px;
      position: relative;
    }
    .arch-frame img {
      width: 100%; height: 100%; object-fit: cover;
    }

    /* 하단 필기체 배치 (나눔손글씨붓 감성을 반영한 이미지) */
    .nanumbrush-text-img {
      max-width: 60%;
      width: auto; height: auto;
      /* 'We are getting married' (나눔손글씨붓)를 이미지화 (image_3.png의 세련된 질감) */
      content: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAApMAAABGCAYAAAByP78LAAAABlBMVEUAAAD///+l2Z/dAAAACXBIWXMAAA7EAAAOxAGVKw4bAAAAx0lEQVR42u3Yyw3CMBQA0RcbZoEyMAI5U6BvESMrswCwAtSAFsgnKzB9w41b9VP9U/1T/VP9U/2D+gf1D+of1D+of1D/oP5B/YP6B/UP6h/UP6h/YP5B/YP6B/UP6h/UP6h/YP6B/UP6h/UP6h/UP6h/YP5B/YP6B/UP6h/UP6h/YP5B/YP6B/UP6h/UP6h/YP6B/UP6h/UP6h/UP6h/YP5B/YP6B/UP6h/UP6h/YP5B/YP6B/UP6h/UP6h/YP6B/UP6B/UP6B/UP/YP4D83eD/XzF2T3QAAAABJRU5ErkJggg==');
      margin-bottom: 20px;
    }
    
    /* 날짜 및 시간 스타일 정의 (정갈한 명조체) */
    .date-text {
      font-family: 'Noto Serif KR', serif;
      font-size: 1rem;
      font-weight: 300;
      color: #333333;
      letter-spacing: -0.5px;
    }

    /* 4. 🌸 벚꽃 잎 흩날리는 이펙트 정의 (image_2.png의 여리여리한 느낌) */
    .cherry-blossom-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: hidden; z-index: 10;
    }
    .petal {
      position: absolute; background: #ffe6eb; /* 연한 벚꽃 핑크색 */
      border-radius: 150% 0 150% 150%;
      opacity: 0.6; pointer-events: none;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(100vh) translateX(100px) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- 1. 🌸 인트로 오버레이 -->
  <div id="intro-overlay">
    <!-- 인트로용 ♥잉크립퀴드체♥ 이미지 -->
    <div class="intro-text-img"></div>
  </div>

  <!-- 메인 스마트폰 레이아웃 외부 감싸개 -->
  <div class="invitation-container">

    <!-- 🌸 벚꽃 레이어 -->
    <div class="cherry-blossom-canvas" id="blossom-area"></div>

    <!-- 2. 🌸 메인 본문 섹션 -->
    <div class="main-content">
      
      <!-- 상단 강원교육새음체 이미지 -->
      <div class="saeeum-text-img"></div>
      
      <!-- 아치형 액자 프레임 -->
      <div class="arch-frame">
        <img src="다운로드.jpg" alt="웨딩 메인 사진">
      </div>
      
      <!-- 하단 나눔손글씨붓 이미지 및 일시 정보 -->
      <div class="nanumbrush-text-img"></div>
      <div class="date-text">2026년 6월 23일 화요일 오후 5시 45분</div>
    </div>

  </div>

  <script>
    /* 인트로 오버레이 페이드아웃 및 제거 (4.5초) */
    setTimeout(() => {
      document.getElementById('intro-overlay').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('intro-overlay').remove();
        /* 인트로가 끝나면 벚꽃잎이 생성되기 시작합니다. */
        startPetals();
      }, 1500);
    }, 4500);

    /* 🌸 실시간 벚꽃잎 흩날리기 이펙트 */
    function startPetals() {
      const blossomArea = document.getElementById('blossom-area');
      const maxPetals = 20; /* 여리여리하게 보이도록 개수 조절 */

      function createPetal() {
        const petal = document.createElement('div');
        petal.className = 'petal';
        
        // 꽃잎의 크기 및 가로 위치 랜덤 세팅
        const size = Math.random() * 5 + 6; // 6px ~ 11px
        petal.style.width = `${size}px`;
        petal.style.height = `${size * 1.4}px`;
        petal.style.left = `${Math.random() * 100}%`;
        
        // 떨어지는 속도 및 흔들림 주기 랜덤화
        const duration = Math.random() * 5 + 6; // 6초 ~ 11초 동안 떨어짐
        petal.style.animationDuration = `${duration}s`;
        petal.style.animationDelay = `${Math.random() * 2}s`;

        blossomArea.appendChild(petal);

        // 애니메이션이 끝나면 삭제
        setTimeout(() => {
          petal.remove();
          createPetal(); // 무한 루프
        }, (duration + 2) * 1000);
      }

      for (let i = 0; i < maxPetals; i++) {
        setTimeout(createPetal, i * 400); // 400ms 간격으로 생성
      }
    }
  </script>
</body>
</html>
