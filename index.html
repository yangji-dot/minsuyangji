<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minsu & Yangji Wedding</title>
  <style>
    body { margin: 0; padding: 0; }

    /* 인트로 오버레이: 배경 사진 적용 */
    #intro-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('다운로드.jpg') no-repeat center center / cover;
      z-index: 9999; display: flex; justify-content: center; align-items: center;
      transition: opacity 1.5s ease;
    }

    /* 더페이스샵 잉크립퀴드체 */
    .intro-text {
      font-size: 3.2rem;
      color: 	#FFB6C1; /* 우아한 핑크색 */
      text-align: center;
      line-height: 1.6;
      white-space: pre-line;
      font-family: 'ink lip:quid', cursive;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .char { opacity: 0; display: inline-block; animation: fadeInChar 0.6s forwards; }
    @keyframes fadeInChar { to { opacity: 1; } }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
</head>
<body>

  <div id="intro-overlay">
    <div class="intro-text" id="intro">♥결혼식에 초대합니다♥</div>
  </div>

  <script>
    const intro = document.getElementById('intro');
    const text = intro.innerText;
    intro.innerText = '';
    
    [...text].forEach((char, i) => {
      // 줄바꿈은 애니메이션 대상에서 제외
      if (char === '\n') {
        intro.appendChild(document.createElement('br'));
      } else {
        const span = document.createElement('span');
        span.className = 'char';
        span.innerText = char;
        span.style.animationDelay = `${i * 0.15}s`;
        intro.appendChild(span);
      }
    });

    // 4초 후 인트로 fade-out
    setTimeout(() => {
      document.getElementById('intro-overlay').style.opacity = '0';
      setTimeout(() => document.getElementById('intro-overlay').remove(), 1500);
    }, 4000);
  </script>
</body>
</html>
