<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조민수 ∙ 김양지 모바일 초대장</title>
  
  <style>
    /* ✨ [눈누 웹폰트 내장] */
    /* 1. 인트로: 더페이스샵 잉크립퀴드체 */
    @font-face {
      font-family: 'InkLipquid';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/InkLipquid.woff') format('woff');
      font-weight: normal; font-style: normal;
    }
    /* 2. 메인 상단: 강원교육새음체 */
    @font-face {
      font-family: 'GangwonSaeeum';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/GangwonSaeeum.woff') format('woff');
      font-weight: normal; font-style: normal;
    }
    /* 3. 메인 하단 필기체: 나눔손글씨 붓 */
    @font-face {
      font-family: 'NanumBrush';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_four@1.2/NanumBrushScript-Regular.woff') format('woff');
      font-weight: normal; font-style: normal;
    }

    /* 기본 초기화 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #f5f4f0;
      color: #333333;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 450px;
      margin: 0 auto;
      background-color: #f5f4f0;
      position: relative;
      min-height: 100vh;
      box-shadow: 0 0 20px rgba(0,0,0,0.02);
    }

    /* 1. 인트로 오버레이 (배경 사진을 더 어둡고 불투명하게 조정하여 가독성 업) */
    #intro-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      /* 투명도를 기존 0.15 -> 0.45로 높여 어둡게 밀도를 주었습니다 */
      background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('다운로드.jpg') no-repeat center center / cover;
      z-index: 9999; display: flex; justify-content: center; align-items: center;
      transition: opacity 1.5s ease;
    }
    .intro-text {
      font-size: 3.2rem; 
      color: #FFB6C1; 
      text-align: center;
      white-space: pre-line; 
      font-family: 'InkLipquid', sans-serif; 
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5); /* 글씨가 묻히지 않게 입체감 부여 */
    }
    .char { opacity: 0; display: inline-block; animation: fadeInChar 0.6s forwards; }
    @keyframes fadeInChar { to { opacity: 1; } }

    /* 2. 메인 콘텐츠 스타일 */
    .main-content {
      padding: 55px 24px;
      text-align: center;
      position: relative;
    }
    
    /* 상단 글씨 세트 (강원교육새음체 적용) */
    .top-text-group {
      font-family: 'GangwonSaeeum', sans-serif;
      word-break: keep-all;
    }
    .sub-title {
      font-size: 1.15rem;
      letter-spacing: 2px; 
      color: #666666;
      margin-bottom: 14px;
    }
    .main-names {
      font-size: 1.8rem; 
      color: #111111;
      margin-bottom: 35px;
    }

    /* 이미지 아치 프레임 */
    .arch-frame {
      width: 100%;
      aspect-ratio: 1 / 1.35;
      border-radius: 220px 220px 0 0;
      overflow: hidden;
      margin-bottom: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }
    .arch-frame img {
      width: 100%; height: 100%; object-fit: cover;
    }

    /* 하단 글씨 세트 */
    .cursive-text {
      font-family: 'NanumBrush', cursive; /* 나눔손글씨 붓체 적용 */
      font-size: 2.8rem; 
      color: #555555;
      margin-bottom: 22px;
      letter-spacing: 1px;
    }
    .main-date {
      font-family: 'GangwonSaeeum', sans-serif; /* 날짜도 새음체로 매칭하여 통일감 부여 */
      font-size: 1.35rem; 
      color: #444444;
    }

    /* 3. 🌸 실시간 흩날리는 연한 벚꽃 효과 */
    .cherry-blossom-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: hidden; z-index: 10;
    }
    .petal {
      position: absolute; 
      background: #ffe3e8; 
      border-radius: 150% 0 150% 150%;
      opacity: 0.45; 
      pointer-events: none;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0deg) scale(0.8); opacity: 0; }
      15% { opacity: 0.55; }
      85% { opacity: 0.55; }
      100% { transform: translateY(100vh) translateX(80px) rotate(540deg) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- 1. 인트로 영역 (어두워진 배경 + 하트 장식 문구 변경) -->
  <div id="intro-overlay">
    <div class="intro-text" id="intro">♥결혼식에 초대합니다♥</div>
  </div>

  <!-- 메인 레이아웃 -->
  <div class="container">
    <div class="cherry-blossom-container" id="blossom-box"></div>

    <div class="main-content">
      <!-- 상단 디자인 배치 (강원교육새음체) -->
      <div class="top-text-group">
        <div class="sub-title">THE NEW BEGINNING</div>
        <div class="main-names">조민수  그리고  김양지</div>
      </div>
      
      <!-- 아치형 액자 프레임 -->
      <div class="arch-frame">
        <img src="다운로드.jpg" alt="웨딩 메인 사진">
      </div>
      
      <!-- 하단 디자인 배치 (나눔손글씨 붓체 + 강원교육새음체 날짜) -->
      <div class="cursive-text">We are getting married</div>
      <div class="main-date">2026년 6월 23일 화요일 오후 5시 45분</div>
    </div>
  </div>

  <script>
    // 인트로 스크립트
    const intro = document.getElementById('intro');
    const text = intro.innerText;
    intro.innerText = '';
    [...text].forEach((char, i) => {
      const span = document.createElement('span');
      span.className = 'char';
      span.innerText = char;
      span.style.animationDelay = `${i * 0.12}s`; // 하트가 생겨서 글자수가 늘어난 만큼 딜레이 살짝 최적화
      intro.appendChild(span);
    });

    setTimeout(() => {
      document.getElementById('intro-overlay').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('intro-overlay').remove();
        startCherryBlossoms(); 
      }, 1500);
    }, 4200);

    // 🌸 벚꽃잎 자바스크립트
    function startCherryBlossoms() {
      const blossomBox = document.getElementById('blossom-box');
      const maxPetals = 20;

      function createPetal() {
        const petal = document.createElement('div');
        petal.className = 'petal';
        
        const size = Math.random() * 5 + 5;
        petal.style.width = `${size}px`;
        petal.style.height = `${size * 1.4}px`;
        petal.style.left = `${Math.random() * 100}%`;
        
        const duration = Math.random() * 4 + 7;
        petal.style.animationDuration = `${duration}s`;
        petal.style.animationDelay = `${Math.random() * 2}s`;

        blossomBox.appendChild(petal);

        setTimeout(() => {
          petal.remove();
          createPetal();
        }, (duration + 2) * 1000);
      }

      for (let i = 0; i < maxPetals; i++) {
        setTimeout(createPetal, i * 350);
      }
    }
  </script>
</body>
</html>
